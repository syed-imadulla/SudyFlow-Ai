<!-- Progress Ring Component -->
<div class="flex items-center justify-center" style="--progress:0.45;">
  <svg class="w-24 h-24" viewBox="0 0 36 36">
    <defs>
      <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="hsl(260,45%,55%)" />
        <stop offset="100%" stop-color="hsl(165,50%,45%)" />
      </linearGradient>
    </defs>
    <!-- Background circle -->
    <circle cx="18" cy="18" r="15.9155" fill="none" stroke="var(--glass-bg)" stroke-width="3.6" />
    <!-- Progress circle -->
    <circle cx="18" cy="18" r="15.9155" fill="none"
            stroke="url(#ringGradient)" stroke-width="3.6"
            stroke-dasharray="100 100"
            style="stroke-dashoffset: calc(100 - var(--progress) * 100); transition: stroke-dashoffset 0.5s ease-out;" />
    <text x="18" y="20.35" class="text-sm font-medium fill-current text-primary" text-anchor="middle">
      <tspan id="progressLabel">45%</tspan>
    </text>
  </svg>
</div>
<script>
  // Optional: expose a function to set progress dynamically
  function setProgress(value) {
    const container = document.currentScript.parentElement;
    container.style.setProperty('--progress', value);
    const label = container.querySelector('#progressLabel');
    if (label) label.textContent = Math.round(value * 100) + '%';
  }
</script>
