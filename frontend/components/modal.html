<!-- Modal Component -->
<div id="modalBackdrop" class="modal-backdrop hidden">
  <div class="modal">
    <h2 class="text-xl font-semibold text-primary mb-4">Modal Title</h2>
    <div class="modal-body mb-4">
      <!-- Insert modal content here -->
    </div>
    <div class="flex justify-end space-x-2">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmModal()">Confirm</button>
    </div>
  </div>
</div>
<script>
function openModal(){document.getElementById('modalBackdrop').classList.remove('hidden');}
function closeModal(){document.getElementById('modalBackdrop').classList.add('hidden');}
function confirmModal(){/* placeholder */closeModal();}
</script>
