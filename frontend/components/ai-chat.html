<!-- AI Chat Component -->
<div class="flex flex-col h-full">
  <div class="flex-1 overflow-y-auto mb-4 space-y-4" id="chatContainer">
    <!-- Example bot message -->
    <div class="flex items-start gap-2">
      <img src="/assets/logo.svg" alt="AI" class="w-8 h-8 rounded-full" />
      <div class="bg-glass p-3 rounded-xl max-w-md">
        <p class="text-sm text-secondary">Hello! How can I help you plan your goal today?</p>
      </div>
    </div>
    <!-- Example user message -->
    <div class="flex items-start justify-end gap-2">
      <div class="bg-primary text-white p-3 rounded-xl max-w-md">
        <p class="text-sm">I need to finish my DBMS mini‑project.</p>
      </div>
    </div>
  </div>
  <form id="aiChatForm" class="flex space-x-2">
    <input type="text" placeholder="Type a message…" class="input flex-1" required />
    <button type="submit" class="btn btn-primary">Send</button>
  </form>
</div>
<script>
  const form = document.getElementById('aiChatForm');
  const input = form.querySelector('input');
  const container = document.getElementById('chatContainer');
  form.onsubmit = (e) => {
    e.preventDefault();
    const msg = input.value.trim();
    if (!msg) return;
    // Append user message
    const userDiv = document.createElement('div');
    userDiv.className = 'flex items-start justify-end gap-2';
    userDiv.innerHTML = `<div class="bg-primary text-white p-3 rounded-xl max-w-md"><p class="text-sm">${msg}</p></div>`;
    container.appendChild(userDiv);
    input.value = '';
    // Placeholder bot response after short delay
    setTimeout(() => {
      const botDiv = document.createElement('div');
      botDiv.className = 'flex items-start gap-2';
      botDiv.innerHTML = `<img src="/assets/logo.svg" alt="AI" class="w-8 h-8 rounded-full" />
        <div class="bg-glass p-3 rounded-xl max-w-md"><p class="text-sm text-secondary">Got it! Let me break it down for you.</p></div>`;
      container.appendChild(botDiv);
      container.scrollTop = container.scrollHeight;
    }, 800);
    container.scrollTop = container.scrollHeight;
  };
</script>
