<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Log In – StudyFlow AI</title>
  <link rel="stylesheet" href="src/css/base.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <script src="router.js"></script>
</head>
<body class="bg-background text-text-primary min-h-screen flex items-center justify-center p-6 antialiased selection:bg-primary selection:text-white relative">
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-primary/10 via-background to-background pointer-events-none"></div>

  <div class="card bg-surface border-border p-8 md:p-10 w-full max-w-md shadow-saas relative z-10 rounded-[20px]">
    <div class="flex flex-col items-center text-center mb-8 cursor-pointer group" onclick="window.location.href='index.html'">
      <div class="w-12 h-12 rounded-2xl bg-primary/10 border border-primary/30 flex items-center justify-center text-primary mb-4 group-hover:scale-105 transition shadow-glow">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      </div>
      <h2 class="text-2xl font-bold tracking-tight text-white font-sans">Welcome back</h2>
      <p class="text-xs text-text-secondary mt-1">Sign in to your AI study workspace</p>
    </div>

    <form class="space-y-4" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
      <div>
        <label class="block text-xs font-semibold text-text-secondary uppercase mb-2">Academic Email</label>
        <input type="email" placeholder="imadulla@university.edu" class="input bg-background-sec border-border focus:border-primary py-3 text-xs" required />
      </div>

      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="block text-xs font-semibold text-text-secondary uppercase">Password</label>
          <a href="#" class="text-xs text-primary hover:underline" onclick="alert('Password reset link sent.');">Forgot?</a>
        </div>
        <input type="password" placeholder="••••••••" class="input bg-background-sec border-border focus:border-primary py-3 text-xs" required />
      </div>

      <button type="submit" class="btn btn-primary w-full py-3 text-xs font-bold shadow-glow mt-2">
        Continue with Copilot →
      </button>
    </form>

    <div class="mt-6 pt-6 border-t border-border text-center">
      <p class="text-xs text-text-muted">
        New student? <a href="register.html" class="text-white font-semibold hover:underline ml-1">Create free account</a>
      </p>
    </div>
  </div>
</body>
</html>
